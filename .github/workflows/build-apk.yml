name: Build NEXO APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Setup Java (JDK ${{ env.JAVA_VERSION }})
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
        
    - name: Install dependencies
      run: npm ci
      
    # ✅ FIX: Solo build web (webpack), sin capacitor
    - name: Build web assets (solo webpack)
      run: npm run build:web
      
    # ✅ FIX: Install Capacitor Android manualmente
    - name: Install Capacitor Android
      run: npm install @capacitor/android
      
    # ✅ FIX: Sync Capacitor (copia assets, NO compila)
    - name: Sync Capacitor Android
      run: npx cap sync android --no-build
      
    # ✅ FIX: Limpiar y crear gradle.properties DESPUÉS del sync
    - name: Fix Gradle Configuration
      working-directory: ./android
      run: |
        # Eliminar cualquier gradle.properties existente
        rm -f gradle.properties
        
        # Crear uno limpio sin org.gradle.java.home
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
        org.gradle.daemon=false
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        chmod +x gradlew
        echo "✅ Gradle properties configurado:"
        cat gradle.properties
        
    # ✅ FIX: Build nativo separado, aquí sí se usa Gradle
    - name: Build Android Debug APK
      working-directory: ./android
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}
      run: ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: nexo-ble-debug-${{ github.run_number }}
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload Build Logs (on failure)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs-${{ github.run_number }}
        path: android/build.log
        retention-days: 1
