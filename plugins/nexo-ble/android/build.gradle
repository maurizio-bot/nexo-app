buildscript {
    ext.kotlin_version = '1.9.20'
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

// ==========================================
// NAP-BLE Plugin Build Configuration v2.3
// Target: Android 14 (API 34) - S24 Ultra
// Protocol: NAP v2.3 Production Ready
// ==========================================

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.nexo.ble'
    compileSdkVersion 34
    
    defaultConfig {
        minSdkVersion 26
        targetSdkVersion 34
        versionCode 1
        // FIX: Versión alineada con NAP-BLE v2.3 Protocol
        versionName "2.3.0-NAP"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    
    lintOptions {
        abortOnError false
    }
    
    compileOptions {
        // NAP: Java 17 requerido para Android 14 features
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
}

repositories {
    google()
    mavenCentral()
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    
    // NAP: Capacitor Core - Proporcionado por app principal
    // No modificar: Configuración validada en Build #621
    implementation project(':capacitor-android')
    
    // NAP: Kotlin Stdlib v1.9.20 (Compatible con AGP 8.2.0)
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.20"
    
    // NAP: AndroidX Core para permisos BLE Android 14
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
}
