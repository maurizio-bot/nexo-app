name: Build NEXO APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Setup Java (JDK ${{ env.JAVA_VERSION }})
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
        
    - name: Install dependencies
      run: npm ci
      
    # ✅ FIX: Solo build web, sin tocar Android aún
    - name: Build web assets (solo webpack)
      run: |
        # Si tu package.json tiene "build" que incluye Android, fuerza solo web:
        if npm run build:web --silent 2>/dev/null; then
          echo "✅ Usando build:web"
        else
          echo "⚠️ Usando build (esperando solo web assets)..."
          npm run build
        fi
        
    - name: Install Capacitor Android
      run: npm install @capacitor/android
      
    - name: Sync Capacitor (copiar web assets a Android)
      run: npx cap sync android
      
    # ✅ FIX DEFINITIVO: Configurar Gradle DESPUÉS del sync
    - name: Fix Gradle Java Home
      working-directory: ./android
      run: |
        rm -f gradle.properties
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
        org.gradle.daemon=false
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        
        chmod +x gradlew
        echo "✅ Gradle properties:"
        cat gradle.properties
        
    - name: Build Android Debug APK
      working-directory: ./android
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}
      run: ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: nexo-ble-debug-${{ github.run_number }}
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

  notify:
    needs: build-android
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notificar estado
      run: |
        if [ "${{ needs.build-android.result }}" == "success" ]; then
          echo "✅ Build #${{ github.run_number }} exitoso!"
        else
          echo "❌ Build #${{ github.run_number }} fallido."
        fi
