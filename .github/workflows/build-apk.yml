name: Build NEXO APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
        
    - name: Install dependencies
      run: npm install
        
    - name: Build web assets
      run: npm run build
      
    - name: Install Capacitor Android
      run: npm install @capacitor/android
      
    - name: Sync Capacitor (con plugin BLE)
      run: npx cap sync android
      
    # ✅ FIX DEFINITIVO: Recrear gradle.properties limpio
    - name: Fix Gradle Java Home
      run: |
        cd android
        # Backup y eliminar propiedades inválidas
        cp gradle.properties gradle.properties.backup 2>/dev/null || true
        # Crear archivo nuevo sin org.gradle.java.home
        echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" > gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "" >> gradle.properties
        echo "# Java home se detecta automáticamente por GitHub Actions" >> gradle.properties
        echo "gradle.properties corregido:"
        cat gradle.properties
        
    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: nexo-ble-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        
    - name: Build Android Release APK
      if: github.ref == 'refs/heads/main'
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon
        
    - name: Upload Release APK
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: nexo-ble-release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        
    - name: Create GitHub Release (Main only)
      if: github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v9.0-ble-${{ github.run_number }}
        name: NEXO v9.0 BLE Build ${{ github.run_number }}
        body: |
          ## NEXO v9.0 con BLE Interface
          
          ### Incluye:
          - ✅ BleMesh v5.0 Native (Capacitor)
          - ✅ BLE Interface UI v1.0 (scan + conexiones)
          - ✅ Fix NORDIC_005 vault provision
          
          Commit: ${{ github.sha }}
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build-android
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notificar estado
      run: |
        if [ "${{ needs.build-android.result }}" == "success" ]; then
          echo "✅ Build #${{ github.run_number }} completado. APK listo!"
        else
          echo "❌ Build fallido. Revisa logs."
        fi
