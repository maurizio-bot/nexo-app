<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="NEXO v10.0 - Mensajería P2P ultra-rápida">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: blob: data: gap: ws: wss:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; media-src 'self' blob:; img-src 'self' data: blob:; connect-src 'self' ws: wss: https:">

  <title>NEXO v10.0</title>
  <!-- CSS se carga via import en main.js (bundler lo inyecta) -->
</head>
<body>
  <!-- SPLASH SCREEN -->
  <div id="splash-native">
    <div id="splash-logo"></div>
    <div id="splash-text">NEXO v10.0</div>
  </div>

  <!-- PERMISSION OVERLAY -->
  <div id="nexo-perm-overlay" style="display:none;">
    <div class="perm-overlay-content">
      <h2>Permisos necesarios</h2>
      <p>NEXO requiere permisos de Bluetooth y ubicación para funcionar.</p>
      <button id="btn-request-perms" class="perm-btn-primary">Conceder permisos</button>
    </div>
  </div>

  <!-- VISTA: LISTA DE CONVERSACIONES -->
  <div id="view-conversations" class="view active">
    <div id="conversations-header">
      <h1>NEXO</h1>
      <div id="status-indicator" class="offline">OFF</div>
      <button id="btn-new-group" class="header-btn">➕</button>
    </div>
    <div id="conversations-list" class="conversations-scroll"></div>
  </div>

  <!-- VISTA: CHAT -->
  <div id="view-chat" class="view">
    <div id="chat-header">
      <button id="btn-back" class="header-btn">←</button>
      <div class="chat-header-info">
        <input type="text" id="chat-contact-name" value="NEXO" autocomplete="off" spellcheck="false">
        <span id="chat-contact-subtitle">OFFLINE</span>
      </div>
      <button id="btn-call" class="header-btn">📞</button>
      <button id="btn-video" class="header-btn">🎥</button>
      <button id="btn-attach" class="header-btn">📎</button>
      <button id="btn-sticker" class="header-btn">😀</button>
      <button id="btn-ble-panel" class="header-btn">📡</button>
    </div>

    <div id="nexo-stream" class="stream-container">
      <div id="messages-container"></div>
    </div>

    <div id="input-area">
      <button id="btn-attach-input" class="input-btn">📎</button>
      <input type="text" id="message-input" placeholder="Mensaje..." autocomplete="off">
      <button id="send-btn">➤</button>
    </div>
  </div>

  <!-- VISTA: CREAR GRUPO -->
  <div id="view-create-group" class="view">
    <div id="group-header">
      <button id="btn-group-back" class="header-btn">←</button>
      <h2>Nuevo Grupo</h2>
    </div>
    <div id="group-form">
      <input type="text" id="group-name-input" placeholder="Nombre del grupo" autocomplete="off">
      <div id="group-contacts-select">
        <h3>Contactos</h3>
        <div id="group-available-contacts"></div>
      </div>
      <button id="btn-create-group-confirm" class="btn-primary">Crear grupo</button>
    </div>
  </div>

  <!-- Vault Panel -->
  <div id="vault-panel" class="vault-hidden">
    <div class="vault-header">
      <h3>Compartir</h3>
    </div>
    <div id="contacts-list"></div>
  </div>

</body>
</html>
