<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="NEXO v9.0 - Diagnóstico de Arranque">
  
  <title>NEXO - Diagnóstico</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: monospace; }
    
    #diagnostic-screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a0a; z-index: 9999;
      display: flex; flex-direction: column;
      padding: 20px; padding-top: max(40px, env(safe-area-inset-top));
    }
    
    #diagnostic-log {
      flex: 1; overflow-y: auto; font-size: 12px; line-height: 1.4;
      border: 1px solid #333; padding: 10px; background: #111;
      margin-bottom: 20px; font-family: 'Courier New', monospace;
    }
    
    .log-entry { margin-bottom: 4px; }
    .log-info { color: #00ff88; }
    .log-error { color: #ff4444; font-weight: bold; }
    .log-warn { color: #ffaa00; }
    .log-step { color: #0099ff; }
    
    #diagnostic-status {
      padding: 15px; background: #1a1a1a; border: 1px solid #333;
      text-align: center; font-weight: bold; color: #00ff88;
    }
    
    #app-container { display: none; width: 100%; height: 100%; flex-direction: column; }
    
    /* [Resto de tus estilos originales...] */
    #messages-container { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
    #input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom)); background: linear-gradient(transparent, #0a0a0a 20%); display: flex; gap: 10px; }
    #message-input { flex: 1; background: rgba(255,255,255,0.1); border: none; border-radius: 20px; padding: 12px 16px; color: white; font-size: 16px; user-select: text; }
    #send-btn { width: 44px; height: 44px; border-radius: 50%; background: #00ff88; border: none; color: #0a0a0a; font-weight: bold; }
    .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; margin-bottom: 8px; animation: slideIn 0.3s ease; }
    .message.own { background: #00ff88; color: #0a0a0a; margin-left: auto; }
    .message.other { background: rgba(255,255,255,0.1); color: white; margin-right: auto; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    #status-indicator { position: fixed; top: max(10px, env(safe-area-inset-top)); right: 10px; padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; background: rgba(0,0,0,0.5); z-index: 1000; }
    #status-indicator.p2p { background: #00ff88; color: #0a0a0a; }
    #status-indicator.relay { background: #0099ff; color: white; }
    #status-indicator.hybrid { background: #ffaa00; color: #0a0a0a; }
    #status-indicator.offline { background: #ff4444; color: white; }
  </style>
</head>
<body>
  <!-- Pantalla de Diagnóstico -->
  <div id="diagnostic-screen">
    <div style="text-align: center; margin-bottom: 15px; color: #00ff88; font-size: 18px;">
      🔧 NEXO v9.0 - Diagnóstico de Arranque
    </div>
    <div id="diagnostic-log"></div>
    <div id="diagnostic-status">⏳ Iniciando...</div>
  </div>

  <!-- App Normal (oculta inicialmente) -->
  <div id="app-container">
    <div id="status-indicator" class="offline">● OFFLINE</div>
    <div id="messages-container"></div>
    <div id="input-area">
      <input type="text" id="message-input" placeholder="Mensaje..." autocomplete="off">
      <button id="send-btn">➤</button>
    </div>
  </div>

  <script>
    // Logger global para diagnóstico
    window.NEXO_DIAG = {
      log: (msg, type = 'info') => {
        const logDiv = document.getElementById('diagnostic-log');
        const entry = document.createElement('div');
        entry.className = `log-entry log-${type}`;
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] ${msg}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(`[NEXO-DIAG] ${msg}`);
      },
      
      setStatus: (status, type = 'info') => {
        const statusDiv = document.getElementById('diagnostic-status');
        statusDiv.textContent = status;
        statusDiv.style.color = type === 'error' ? '#ff4444' : '#00ff88';
      },
      
      showApp: () => {
        document.getElementById('diagnostic-screen').style.display = 'none';
        document.getElementById('app-container').style.display = 'flex';
      }
    };

    // Log inicial inmediato
    window.NEXO_DIAG.log('📱 HTML cargado correctamente', 'step');
    window.NEXO_DIAG.log('🔄 Esperando main.js...', 'info');
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
