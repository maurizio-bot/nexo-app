name: NEXO CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install
        run: npm install 
      
      - name: Build
        run: npm run build
      
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
