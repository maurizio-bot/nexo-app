<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' wss: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: https:;">
    <title>NEXO v9.0</title>
    
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --accent-cyan: #00d4ff;
            --accent-purple: #9d4edd;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff3366;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior: none;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
            position: fixed;
        }
        
        #app {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        
        #status-bar {
            height: var(--safe-top);
            background: var(--bg-primary);
        }
        
        #header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--bg-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        #connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            animation: pulse 2s infinite;
        }
        
        .status-dot.online { background: var(--success); }
        .status-dot.relay { background: var(--accent-cyan); }
        .status-dot.hybrid { background: var(--accent-purple); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg-primary);
        }
        
        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border-left: 3px solid var(--accent-cyan);
            animation: slideIn 0.3s ease;
        }
        
        .message-header {
            font-size: 11px;
            color: var(--accent-cyan);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        
        .message-body {
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.4;
            word-break: break-word;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #input-area {
            padding: 12px 16px calc(12px + var(--safe-bottom));
            background: var(--bg-secondary);
            border-top: 1px solid var(--bg-tertiary);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        #message-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            user-select: text;
        }
        
        #send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-cyan);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        #send-btn:active {
            transform: scale(0.9);
        }
        
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #loading.error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        #loading.error .loader {
            display: none;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            color: var(--danger);
            text-align: center;
            padding: 0 20px;
        }
        
        .retry-btn {
            padding: 12px 24px;
            background: var(--accent-cyan);
            border: none;
            border-radius: 20px;
            color: var(--bg-primary);
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader"></div>
        <p id="loading-text" style="margin-top: 20px; color: var(--text-secondary);">Iniciando NEXO...</p>
    </div>

    <div id="app">
        <div id="status-bar"></div>
        <div id="header">
            <h1>NEXO</h1>
            <div id="connection-status">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Offline</span>
            </div>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Mensaje..." autocomplete="off" maxlength="2000">
            <button id="send-btn" aria-label="Enviar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script type="module">
        // [FIX 2.0.1] Función de escape HTML para prevenir XSS
        function escapeHtml(text) {
            if (text == null) return '';
            const str = String(text);
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        // [FIX 2.0.2] Timeout de inicialización (10 segundos)
        const INIT_TIMEOUT = 10000;
        
        import NexoApp from './app/nexo_app.js';
        
        let app = null;
        let eventListeners = []; // [FIX 2.0.3] Tracking de listeners para cleanup
        
        function addTrackedListener(element, event, handler, options) {
            element.addEventListener(event, handler, options);
            eventListeners.push({ element, event, handler, options });
        }
        
        function removeAllListeners() {
            eventListeners.forEach(({ element, event, handler, options }) => {
                element.removeEventListener(event, handler, options);
            });
            eventListeners = [];
        }
        
        async function init() {
            const loadingText = document.getElementById('loading-text');
            
            try {
                // [FIX 2.0.2] Timeout de inicialización
                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error('Timeout: La aplicación no pudo iniciar')), INIT_TIMEOUT);
                });
                
                app = new NexoApp({
                    relayUrls: ['wss://relay.nexo.app/ws'],
                    container: document.getElementById('messages'),
                    onMessage: handleMessage,
                    onStatusChange: updateStatus,
                    onError: handleError
                });
                
                await Promise.race([app.init(), timeoutPromise]);
                
                // Ocultar loading
                document.getElementById('loading').classList.add('hidden');
                
                // Setup UI
                setupEventListeners();
                
                // [FIX 2.0.3] Cleanup al cerrar página
                window.addEventListener('beforeunload', () => {
                    if (app && typeof app.destroy === 'function') {
                        app.destroy();
                    }
                    removeAllListeners();
                });
                
            } catch (error) {
                console.error('Error iniciando NEXO:', error);
                loadingText.textContent = 'Error: ' + error.message;
                loadingText.style.color = 'var(--danger)';
                
                // Mostrar botón de retry
                const loader = document.querySelector('.loader');
                if (loader) loader.style.display = 'none';
                
                const retryBtn = document.createElement('button');
                retryBtn.className = 'retry-btn';
                retryBtn.textContent = 'Reintentar';
                retryBtn.onclick = () => location.reload();
                document.getElementById('loading').appendChild(retryBtn);
            }
        }
        
        function handleMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message';
            
            // [FIX 2.0.1] Sanitizar todos los datos dinámicos
            const source = escapeHtml(msg._source || 'Unknown');
            const time = new Date(msg.timestamp || Date.now()).toLocaleTimeString();
            const text = escapeHtml(msg.text || JSON.stringify(msg));
            
            div.innerHTML = `
                <div class="message-header">
                    <span>${source}</span>
                    <span>${time}</span>
                </div>
                <div class="message-body">${text}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function updateStatus(mode) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            
            dot.className = 'status-dot';
            
            switch(mode) {
                case 'BLE':
                    dot.classList.add('online');
                    text.textContent = 'P2P';
                    break;
                case 'RELAY':
                    dot.classList.add('relay');
                    text.textContent = 'Relay';
                    break;
                case 'HYBRID':
                    dot.classList.add('hybrid');
                    text.textContent = 'Hybrid';
                    break;
                default:
                    text.textContent = 'Offline';
            }
        }
        
        function handleError(error) {
            console.error('NEXO Error:', error);
            // Evitar alertas spam - solo loggear
        }
        
        function setupEventListeners() {
            const input = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            
            const send = async () => {
                const text = input.value.trim();
                if (!text || !app) return;
                
                try {
                    await app.sendMessage({ type: 'chat', text });
                    input.value = '';
                    
                    // Mostrar mensaje propio
                    handleMessage({
                        text,
                        timestamp: Date.now(),
                        _source: 'You'
                    });
                } catch (e) {
                    console.error('Error enviando:', e);
                    // Feedback visual en lugar de alert
                    sendBtn.style.background = 'var(--danger)';
                    setTimeout(() => {
                        sendBtn.style.background = '';
                    }, 300);
                }
            };
            
            // [FIX 2.0.3] Usar tracked listeners
            addTrackedListener(sendBtn, 'click', send);
            addTrackedListener(input, 'keypress', (e) => {
                if (e.key === 'Enter') send();
            });
        }
        
        // Iniciar
        init();
    </script>
</body>
</html>
