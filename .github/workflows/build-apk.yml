name: Build NEXO APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Setup Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'  # Añadido cache de Gradle para builds más rápidos
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
        
    - name: Install dependencies
      run: npm ci
        
    - name: Build web assets
      run: npm run build
      
    - name: Install Capacitor Android
      run: npm install @capacitor/android
      
    - name: Sync Capacitor (con plugin BLE)
      run: npx cap sync android
      
    # ✅ FIX: Limpiar JAVA_HOME hardcodeado en gradle.properties
    - name: Fix Gradle Java Home
      run: |
        cd android
        # Eliminar línea org.gradle.java.home si existe (causa error en GitHub Actions)
        sed -i '/org.gradle.java.home/d' gradle.properties
        # Verificar que se eliminó
        echo "gradle.properties actual:"
        cat gradle.properties
        
    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: nexo-ble-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        
    - name: Build Android Release APK
      if: github.ref == 'refs/heads/main'
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon
        
    - name: Upload Release APK
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: nexo-ble-release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        
    - name: Create GitHub Release (Main only)
      if: github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v9.0-ble-${{ github.run_number }}
        name: NEXO v9.0 BLE Build ${{ github.run_number }}
        body: |
          ## NEXO v9.0 con BLE Interface
          
          ### Incluye:
          - ✅ BleMesh v5.0 Native (Capacitor)
          - ✅ BLE Interface UI v1.0 (scan + conexiones)
          - ✅ REM v2.1 (feedback visual)
          - ✅ Vault Slider (gestos)
          - ✅ Fix NORDIC_005 vault provision
          
          ### Descargas:
          - `app-debug.apk` - Debug (para testing)
          - `app-release-unsigned.apk` - Release (requiere firma manual)
          
          ### Instalación en Android:
          1. Descarga el APK
          2. Permite "Instalar de fuentes desconocidas"
          3. Abre NEXO y concede permisos BLE
          
          Commit: ${{ github.sha }}
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build-android
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notificar estado
      run: |
        if [ "${{ needs.build-android.result }}" == "success" ]; then
          echo "✅ Build #${{ github.run_number }} completado. Fix NORDIC_005 aplicado."
        else
          echo "❌ Build fallido. Revisa logs."
        fi
