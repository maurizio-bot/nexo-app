name: Build NEXO APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Setup Java (JDK ${{ env.JAVA_VERSION }})
      id: setup-java  # <-- Agregado para referencia
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'gradle'  # <-- Agregado para performance
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build web assets
      run: npm run build
      
    - name: Sync Capacitor
      run: npx cap sync android
      
    # FIX: Configurar Gradle SIN hardcodear java.home (Gradle detecta JAVA_HOME automáticamente)
    - name: Configure Gradle
      working-directory: ./android
      run: |
        rm -f gradle.properties
        cat > gradle.properties << EOF
        org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
        org.gradle.daemon=false
        android.useAndroidX=true
        android.enableJetifier=true
        # No incluir org.gradle.java.home - dejar que Gradle detecte JAVA_HOME del sistema
        EOF
        chmod +x gradlew
        
    - name: Verify Environment
      run: |
        echo "JAVA_HOME: $JAVA_HOME"
        java -version
        
    # FIX: Eliminado el env: JAVA_HOME que causaba el error
    - name: Build Android Debug APK
      working-directory: ./android
      run: |
        echo "Building with system JAVA_HOME: $JAVA_HOME"
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Verify APK
      if: success()
      run: |
        ls -lh android/app/build/outputs/apk/debug/
        
    - name: Create Release with APK
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v9.4.1-BLE.${{ github.run_number }}
        name: "NEXO BLE Android 14 Build #${{ github.run_number }}"
        body: |
          ## 🚀 NEXO v9.4.1 - BLE Android 14 Ready
          
          **Fixes:**
          - ✅ Fix Gradle Java Home detection
          - ✅ Permisos BLE Android 14
        files: android/app/build/outputs/apk/debug/app-debug.apk
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
