name: NEXO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build Web Assets
        run: npm run build
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Configure Gradle
        working-directory: ./android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          # Eliminar gradle.properties anterior completamente
          rm -f gradle.properties
          
          # Crear gradle.properties nuevo con expansión correcta de variables
          echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" > gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
          
          # Verificar permisos gradlew
          chmod +x gradlew
          
          # Debug: Mostrar contenido exacto del archivo
          echo "=== CONTENIDO DE gradle.properties ==="
          cat -A gradle.properties
          echo "======================================"
          echo "JAVA_HOME actual: $JAVA_HOME"
      
      - name: Build Android Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexo-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
