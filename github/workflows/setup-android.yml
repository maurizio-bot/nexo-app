name: Setup Android Platform

on:
  workflow_dispatch:  # Solo manual desde app GitHub

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permiso para hacer push
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Generate package-lock.json
      working-directory: client
      run: npm install  # Genera package-lock.json
      
    - name: Add Android Platform
      working-directory: client
      run: npx cap add android  # Crea directorio android/
      
    - name: Commit and Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add client/package-lock.json client/android/
        git commit -m "Setup: Add package-lock.json and Android platform"
        git push
