apply plugin: 'com.android.library'

android {
    namespace 'com.nexo.ble'
    compileSdkVersion 34
    
    defaultConfig {
        minSdkVersion 22
        targetSdkVersion 34
        versionCode 1
        versionName "1.2.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            consumerProguardFiles 'proguard-rules.pro'
        }
    }
    
    lintOptions {
        abortOnError false
        checkReleaseBuilds false
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    // Deshabilitar tareas problemáticas
    tasks.whenTaskAdded { task ->
        if (task.name.contains("copy") && task.name.contains("Jni")) {
            task.enabled = false
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation project(':capacitor-android')
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
}
