name: NEXO APK Auto-Release

on:
  push:
    branches: [nexo961shim]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout nexo961shim
        uses: actions/checkout@v4
        with:
          ref: nexo961shim
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      # CRITICAL FIX: Solo build web (webpack), NO tocar Android todavía
      - name: Build Web Only
        run: npm run build:web

      # Configurar AndroidX ANTES de que Capacitor genere/copie archivos Android
      - name: Pre-configure AndroidX (Pre-Sync)
        run: |
          mkdir -p android
          rm -f android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" > android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "=== Pre-sync AndroidX OK ==="
          cat android/gradle.properties

      - name: Sync Capacitor
        run: npx cap sync android

      # Forzar AndroidX de nuevo por si cap sync lo sobreescribió
      - name: Emergency AndroidX Override (Post-Sync)
        working-directory: ./android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          echo "=== Verificando post-sync ==="
          cat gradle.properties || echo "ARCHIVO NO EXISTE"

          rm -f gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" > gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
          chmod +x gradlew
          echo "=== AndroidX Forzado OK ==="
          cat gradle.properties

      - name: Build Android Debug APK
        working-directory: ./android
        run: |
          if ! grep -q "android.useAndroidX=true" gradle.properties; then
            echo "::error:: AndroidX no está habilitado!"
            exit 1
          fi
          ./gradlew clean assembleDebug --stacktrace

      - name: Rename APK with timestamp
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA:0:7}
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/nexo-nexo961shim-${TIMESTAMP}-${SHORT_SHA}.apk
          echo "APK_NAME=nexo-nexo961shim-${TIMESTAMP}-${SHORT_SHA}.apk" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Create GitHub Release with APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nexo961shim-${{ env.TIMESTAMP }}-${{ github.sha }}
          name: "NEXO nexo961shim Build ${{ env.TIMESTAMP }}"
          prerelease: true
          files: release/${{ env.APK_NAME }}
          generate_release_notes: true
          body: |
            🚀 Build automático de la rama **nexo961shim**

            - **Commit:** ${{ github.sha }}
            - **Fecha:** ${{ env.TIMESTAMP }}
            - **Rama:** nexo961shim
            - **Estado:** Prerelease / Nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
