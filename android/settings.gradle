// Cargar capacitor-android PRIMERO para que exista antes de los plugins
apply from: 'capacitor.settings.gradle'

// Luego incluir módulos que dependen de capacitor-android
include ':app'
include ':capacitor-cordova-android-plugins'
include ':capacitor-nexo-auth'
include ':capacitor-nexo-ble'

project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')
project(':capacitor-nexo-auth').projectDir = new File('../plugins/nexo-auth/android')
project(':capacitor-nexo-ble').projectDir = new File('../plugins/nexo-ble/android')
