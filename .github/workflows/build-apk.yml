name: Build NEXO APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    # ✅ FIX: Configurar Java SIN cache de gradle para evitar conflictos de paths
    - name: Setup Java (JDK ${{ env.JAVA_VERSION }})
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        # Eliminado cache: 'gradle' que causaba el conflicto de java.home
        
    - name: Verificar Java Installation
      run: |
        echo "JAVA_HOME=$JAVA_HOME"
        java -version
        which java
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build web assets
      run: npm run build
      
    - name: Install Capacitor Android
      run: npm install @capacitor/android
      
    - name: Sync Capacitor (con plugin BLE)
      run: npx cap sync android
      
    # ✅ FIX DEFINITIVO: Limpiar gradle.properties completamente
    - name: Fix Gradle Configuration
      working-directory: ./android
      run: |
        # Eliminar gradle.properties si existe (limpieza total)
        rm -f gradle.properties
        
        # Crear gradle.properties limpio SIN org.gradle.java.home
        cat > gradle.properties << 'EOF'
        # Project-wide Gradle settings
        org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
        org.gradle.parallel=true
        org.gradle.daemon=false
        org.gradle.configureondemand=false
        
        # AndroidX
        android.useAndroidX=true
        android.enableJetifier=true
        
        # Kotlin
        kotlin.code.style=official
        EOF
        
        echo "✅ gradle.properties configurado:"
        cat gradle.properties
        
        # Asegurar permisos de gradlew
        chmod +x gradlew
        
    - name: Build Android Debug APK
      working-directory: ./android
      env:
        # Asegurar que Gradle use el JAVA_HOME correcto del entorno
        JAVA_HOME: ${{ env.JAVA_HOME }}
      run: ./gradlew assembleDebug --stacktrace --no-daemon
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: nexo-ble-debug-${{ github.run_number }}
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        
    - name: Build Android Release APK
      if: github.ref == 'refs/heads/main' && success()
      working-directory: ./android
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}
      run: ./gradlew assembleRelease --stacktrace --no-daemon
        
    - name: Upload Release APK
      if: github.ref == 'refs/heads/main' && success()
      uses: actions/upload-artifact@v4
      with:
        name: nexo-ble-release-${{ github.run_number }}
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        
    - name: Create GitHub Release (Main only)
      if: github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v9.0-ble-${{ github.run_number }}
        name: NEXO v9.0 BLE Build ${{ github.run_number }}
        body: |
          ## 🚀 NEXO v9.0 BLE Build #${{ github.run_number }}
          
          ### ✅ Incluye:
          - BleMesh v5.0 Native (Capacitor)
          - BLE Interface UI v1.0
          - Fix NORDIC_005 vault provision
          - Gradle fix (Java home validation)
          
          **Commit:** ${{ github.sha }}
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release-unsigned.apk
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build-android
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Notificar estado
      run: |
        if [ "${{ needs.build-android.result }}" == "success" ]; then
          echo "✅ Build #${{ github.run_number }} exitoso!"
        else
          echo "❌ Build #${{ github.run_number }} fallido."
        fi
