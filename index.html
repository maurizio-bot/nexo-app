<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="NEXO v4.0-IDENTITY - Mensajeria P2P">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: blob: data: gap: ws: wss:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; media-src 'self' blob:; img-src 'self' data: blob:; connect-src 'self' ws: wss: https:">
  <title>NEXO v4.0</title>
</head>
<body>
  <!-- SPLASH SCREEN -->
  <div id="splash-native">
    <div id="splash-logo"></div>
    <div id="splash-text">NEXO v4.0</div>
  </div>

  <!-- ==================== VISTA 1: LISTA DE CONVERSACIONES ==================== -->
  <div id="view-conversations" class="view active">
    <!-- Header de lista -->
    <div id="conversations-header">
      <h1>Conversaciones</h1>
      <button id="btn-new-group" class="header-btn" title="Nuevo grupo">👥</button>
      <button id="btn-ble-panel" class="header-btn" title="BLE">🔷</button>
    </div>

    <!-- Lista de conversaciones -->
    <div id="conversations-list" class="conversations-scroll">
      <!-- Items generados dinamicamente -->
      <div class="conversation-empty">No hay conversaciones. Conecta un dispositivo BLE para empezar.</div>
    </div>
  </div>

  <!-- ==================== VISTA 2: CHAT INDIVIDUAL / GRUPO ==================== -->
  <div id="view-chat" class="view">
    <!-- Chat Header -->
    <div id="chat-header">
      <button id="btn-back" class="header-btn">←</button>
      <div class="chat-header-info">
        <input type="text" id="chat-contact-name" value="NEXO" autocomplete="off" spellcheck="false">
        <span id="chat-contact-subtitle">OFFLINE</span>
      </div>
      <button id="btn-call" class="header-btn" title="Llamada">📞</button>
      <button id="btn-video" class="header-btn" title="Videollamada">📹</button>
    </div>

    <!-- Mensajes -->
    <div id="nexo-stream" class="stream-container">
      <div id="messages-container"></div>
    </div>

    <!-- Input Area con botones extendidos -->
    <div id="input-area">
      <button id="btn-attach" class="input-btn" title="Adjuntar archivo">📎</button>
      <button id="btn-sticker" class="input-btn" title="Enviar sticker">😊</button>
      <input type="text" id="message-input" placeholder="Mensaje..." autocomplete="off">
      <button id="send-btn">➤</button>
    </div>
  </div>

  <!-- ==================== VISTA 3: CREAR GRUPO ==================== -->
  <div id="view-create-group" class="view">
    <div id="group-header">
      <button id="btn-group-back" class="header-btn">←</button>
      <h2>Nuevo grupo</h2>
    </div>
    <div id="group-form">
      <input type="text" id="group-name-input" placeholder="Nombre del grupo..." autocomplete="off">
      <div id="group-contacts-select">
        <h3>Selecciona contactos</h3>
        <div id="group-available-contacts"></div>
      </div>
      <button id="btn-create-group-confirm" class="btn-primary">Crear grupo</button>
    </div>
  </div>

  <!-- ==================== PANELES OVERLAY ==================== -->
  <!-- Vault Panel (deslizable) -->
  <div id="vault-panel" class="vault-hidden">
    <div class="vault-header">
      <h3>Compartir</h3>
    </div>
    <div id="contacts-list"></div>
  </div>

  <!-- BLE Panel (desde izquierda) -->
  <div id="ble-panel" class="panel-hidden">
    <div class="panel-header">
      <h3>BLE Mesh</h3>
      <button id="ble-panel-close">✕</button>
    </div>
    <div id="ble-panel-content"></div>
  </div>

</body>
</html>
