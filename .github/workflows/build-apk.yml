name: NEXO APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Install Dependencies
        run: |
          npm ci
          # Fix dependencias npm críticas para NEXO (Build #541)
          npm install ajv@^8.12.0 minimatch@^9.0.0 --save-dev
      
      - name: Build Web Assets
        run: npm run build
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Configure Gradle
        working-directory: ./android
        run: |
          # Eliminar gradle.properties si existe (residuo de sync)
          rm -f gradle.properties
          
          # Crear gradle.properties con heredoc (Build #609 fix)
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.java.home=${JAVA_HOME}
          EOF
          
          chmod +x gradlew
          
          echo "✅ Gradle configurado:"
          cat gradle.properties
      
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build Android Debug APK
        working-directory: ./android
        run: |
          ./gradlew assembleDebug --stacktrace
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexo-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
