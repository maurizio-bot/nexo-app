<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="NEXO v9.0 - Mensajería P2P">
  
  <title>NEXO</title>
  
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      user-select: none;
    }
    
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #0a0a0a; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ============================================
       1. SPLASH SCREEN - Pantalla de apertura
       ============================================ */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f23 50%, #0a0a0a 100%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    
    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    
    #splash-logo {
      width: 140px;
      height: 140px;
      border-radius: 32px;
      box-shadow: 
        0 0 60px rgba(0, 255, 136, 0.3),
        0 0 100px rgba(0, 255, 136, 0.1);
      animation: splash-breathe 3s ease-in-out infinite;
      object-fit: cover;
    }
    
    #splash-brand {
      margin-top: 28px;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #00ff88, #00ccff, #00ff88);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: splash-shine 3s linear infinite;
    }
    
    #splash-version {
      margin-top: 8px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 2px;
    }
    
    #splash-progress-container {
      position: absolute;
      bottom: 100px;
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    
    #splash-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ff88, #00ccff);
      box-shadow: 0 0 10px #00ff88;
      transition: width 0.3s ease;
      border-radius: 3px;
    }
    
    @keyframes splash-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes splash-shine {
      to { background-position: 200% center; }
    }

    /* ============================================
       2. DIAGNÓSTICO - Logs/Debug
       ============================================ */
    #diagnostic-screen {
      position: fixed; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0;
      background: #0a0a0a; 
      z-index: 99998;
      display: none;
      flex-direction: column;
      padding: 20px; 
      padding-top: max(50px, env(safe-area-inset-top));
      font-family: 'Courier New', monospace;
    }
    
    #diagnostic-screen.active {
      display: flex;
    }
    
    #diagnostic-header {
      text-align: center; 
      margin-bottom: 20px; 
      color: #00ff88; 
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(0,255,136,0.2);
      padding-bottom: 15px;
    }
    
    #diagnostic-log {
      flex: 1; 
      overflow-y: auto; 
      font-size: 12px; 
      line-height: 1.5;
      border: 1px solid #222; 
      padding: 15px; 
      background: #0d0d0d;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    
    .log-entry { 
      margin-bottom: 6px; 
      opacity: 0;
      animation: fade-in 0.3s forwards;
    }
    
    @keyframes fade-in {
      to { opacity: 1; }
    }
    
    .log-info { color: #00ff88; }
    .log-error { color: #ff4444; font-weight: bold; }
    .log-warn { color: #ffaa00; }
    .log-step { color: #0099ff; }
    
    #diagnostic-status {
      padding: 16px; 
      background: #151515; 
      border: 1px solid #333;
      border-radius: 8px;
      text-align: center; 
      font-weight: bold; 
      color: #00ff88;
      font-size: 14px;
    }

    /* ============================================
       3. APP PRINCIPAL - Chat
       ============================================ */
    #app-container { 
      display: none; 
      width: 100%; 
      height: 100%; 
      flex-direction: column;
      background: #0a0a0a;
    }
    
    #status-indicator { 
      position: fixed; 
      top: max(12px, env(safe-area-inset-top)); 
      right: 12px; 
      padding: 6px 12px; 
      border-radius: 12px; 
      font-size: 11px; 
      font-weight: bold; 
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 1000;
      transition: all 0.3s;
    }
    
    #status-indicator.p2p { 
      background: rgba(0,255,136,0.15); 
      color: #00ff88; 
      border-color: rgba(0,255,136,0.3);
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }
    
    #status-indicator.relay { 
      background: rgba(0,153,255,0.15); 
      color: #0099ff; 
      border-color: rgba(0,153,255,0.3);
    }
    
    #status-indicator.hybrid { 
      background: rgba(255,170,0,0.15); 
      color: #ffaa00; 
      border-color: rgba(255,170,0,0.3);
    }
    
    #status-indicator.offline { 
      background: rgba(255,68,68,0.15); 
      color: #ff4444; 
      border-color: rgba(255,68,68,0.3);
    }

    #messages-container { 
      flex: 1; 
      overflow-y: auto; 
      padding: 20px; 
      padding-top: 60px;
      padding-bottom: 120px;
      -webkit-overflow-scrolling: touch;
    }
    
    .message { 
      max-width: 80%; 
      padding: 12px 16px; 
      border-radius: 20px; 
      margin-bottom: 10px;
      font-size: 15px;
      line-height: 1.4;
      animation: message-in 0.3s ease;
      word-wrap: break-word;
    }
    
    @keyframes message-in {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    .message.own { 
      background: linear-gradient(135deg, #00ff88, #00cc6a); 
      color: #0a0a0a; 
      margin-left: auto; 
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }
    
    .message.other { 
      background: rgba(255,255,255,0.08); 
      color: white; 
      margin-right: auto; 
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #input-area { 
      position: fixed; 
      bottom: 0; 
      left: 0; 
      right: 0; 
      padding: 16px; 
      padding-bottom: max(16px, env(safe-area-inset-bottom)); 
      background: linear-gradient(to top, #0a0a0a 60%, transparent); 
      display: flex; 
      gap: 10px;
      z-index: 100;
    }
    
    #message-input { 
      flex: 1; 
      background: rgba(255,255,255,0.08); 
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; 
      padding: 12px 20px; 
      color: white; 
      font-size: 16px;
      user-select: text;
      outline: none;
      transition: all 0.3s;
    }
    
    #message-input:focus {
      background: rgba(255,255,255,0.12);
      border-color: rgba(0,255,136,0.3);
    }
    
    #message-input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    
    #send-btn { 
      width: 48px; 
      height: 48px; 
      border-radius: 50%; 
      background: linear-gradient(135deg, #00ff88, #00cc6a); 
      border: none; 
      color: #0a0a0a; 
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(0,255,136,0.3);
    }
    
    #send-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <!-- ============================================
       1. SPLASH SCREEN (Logo + animación)
       ============================================ -->
  <div id="splash-screen">
    <!-- Logo desde public/logo.png -->
    <img id="splash-logo" src="logo.png" alt="NEXO">
    <div id="splash-brand">NEXO</div>
    <div id="splash-version">v9.0</div>
    
    <div id="splash-progress-container">
      <div id="splash-progress-bar"></div>
    </div>
  </div>

  <!-- ============================================
       2. DIAGNÓSTICO (Logs de arranque)
       ============================================ -->
  <div id="diagnostic-screen">
    <div id="diagnostic-header">
      🔧 NEXO v9.0 - Diagnóstico de Arranque
    </div>
    <div id="diagnostic-log"></div>
    <div id="diagnostic-status">⏳ Iniciando...</div>
  </div>

  <!-- ============================================
       3. APP PRINCIPAL (UI de chat)
       ============================================ -->
  <div id="app-container">
    <div id="status-indicator" class="offline">● OFFLINE</div>
    
    <div id="messages-container"></div>
    
    <div id="input-area">
      <input type="text" id="message-input" placeholder="Mensaje..." autocomplete="off">
      <button id="send-btn">➤</button>
    </div>
  </div>

  <!-- ============================================
       SISTEMA DE VISTAS Y LOGGER
       ============================================ -->
  <script>
    /**
     * NEXO View Manager v1.0-NAP
     * Controla transición: Splash → Diagnóstico → App
     */
    
    window.NEXO_DIAG = {
      log: (msg, type = 'info') => {
        const logDiv = document.getElementById('diagnostic-log');
        const statusDiv = document.getElementById('diagnostic-status');
        
        if (logDiv) {
          const entry = document.createElement('div');
          entry.className = `log-entry log-${type}`;
          const time = new Date().toLocaleTimeString();
          entry.textContent = `[${time}] ${msg}`;
          logDiv.appendChild(entry);
          logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        if (type === 'step' && statusDiv) {
          statusDiv.textContent = msg;
        }
        
        console.log(`[NEXO-${type.toUpperCase()}] ${msg}`);
      },
      
      setStatus: (status, type = 'info') => {
        const statusDiv = document.getElementById('diagnostic-status');
        if (statusDiv) {
          statusDiv.textContent = status;
          statusDiv.style.color = type === 'error' ? '#ff4444' : '#00ff88';
        }
      },
      
      showApp: () => {
        const diag = document.getElementById('diagnostic-screen');
        const app = document.getElementById('app-container');
        
        if (diag) diag.classList.remove('active');
        if (app) app.style.display = 'flex';
        
        window.NEXO_DIAG.log('✅ App lista y visible', 'info');
      }
    };

    // Secuencia de inicio: Splash → Diagnóstico
    (function StartSequence() {
      const splash = document.getElementById('splash-screen');
      const diagnostic = document.getElementById('diagnostic-screen');
      const progressBar = document.getElementById('splash-progress-bar');
      
      // Animar progreso
      setTimeout(() => { if (progressBar) progressBar.style.width = '30%'; }, 100);
      setTimeout(() => { if (progressBar) progressBar.style.width = '70%'; }, 1000);
      setTimeout(() => { if (progressBar) progressBar.style.width = '100%'; }, 1800);
      
      // Transición a Diagnóstico después de 2s
      setTimeout(() => {
        if (splash) splash.classList.add('hidden');
        if (diagnostic) diagnostic.classList.add('active');
        
        window.NEXO_DIAG.log('📱 HTML cargado correctamente', 'step');
        window.NEXO_DIAG.log('🔄 Cargando módulos principales...', 'info');
        
      }, 2000);
    })();
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
