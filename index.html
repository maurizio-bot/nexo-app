<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <title>NEXO</title>
  <link rel="stylesheet" href="./critical.css">
</head>
<body>
  <!-- SPLASH -->
  <div id="splash-native">
    <div id="splash-logo">
      <div class="splash-icon">◆</div>
    </div>
    <div id="splash-text">NEXO</div>
    <div id="splash-sub">Secure Mesh Messaging</div>
  </div>

  <!-- AVISO BLUETOOTH -->
  <div id="bt-banner" class="hidden">
    <span class="bt-icon">📡</span>
    <span class="bt-text">Bluetooth apagado</span>
    <button class="bt-action">Activar</button>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <!-- HEADER -->
    <div id="app-header">
      <div class="header-title">NEXO</div>
      <div class="header-actions">
        <button class="header-btn" id="btn-search">🔍</button>
        <button class="header-btn" id="btn-menu">⋮</button>
      </div>
    </div>

    <!-- TABS -->
    <div id="app-tabs">
      <button class="tab-btn active" data-tab="ble">BLE</button>
      <button class="tab-btn" data-tab="chats">Chats</button>
      <button class="tab-btn" data-tab="vault">Vault</button>
    </div>

    <!-- TAB BLE -->
    <div id="tab-ble" class="tab-content active">
      <div class="ble-controls">
        <button class="ble-main-btn" id="btn-visibility">
          <span class="btn-icon">👁️</span>
          <span class="btn-label">Visible</span>
        </button>
        <button class="ble-main-btn" id="btn-scan">
          <span class="btn-icon">🔍</span>
          <span class="btn-label">Buscar</span>
        </button>
      </div>
      <div class="section-title">Dispositivos encontrados</div>
      <div id="ble-devices-list" class="list-container">
        <div class="empty-state">Presiona Buscar para encontrar dispositivos</div>
      </div>
      <div class="section-title">Contactos BLE</div>
      <div id="ble-contacts-list" class="list-container">
        <div class="empty-state">No hay contactos guardados</div>
      </div>
    </div>

    <!-- TAB CHATS -->
    <div id="tab-chats" class="tab-content">
      <div id="conversations-list" class="list-container">
        <div class="empty-state">No hay conversaciones</div>
      </div>
    </div>

    <!-- TAB VAULT -->
    <div id="tab-vault" class="tab-content">
      <div class="empty-state">Vault - Próximamente</div>
    </div>

    <!-- FAB -->
    <button id="fab-new" class="fab">+</button>
  </div>

  <!-- CHAT VIEW -->
  <div id="chat-view" class="hidden">
    <div id="chat-header">
      <button class="chat-back" id="chat-back">◀</button>
      <div class="chat-info">
        <div class="chat-name" id="chat-name">Contacto</div>
        <div class="chat-status" id="chat-status">OFFLINE</div>
      </div>
      <button class="header-btn" id="chat-menu">⋮</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <button class="input-btn" id="btn-emoji">😊</button>
      <input type="text" id="message-input" placeholder="Mensaje..." autocomplete="off">
      <button class="input-btn send" id="btn-send">➤</button>
    </div>
  </div>

  <!-- BLE PANEL LATERAL -->
  <div id="ble-panel">
    <div class="panel-header">
      <h3>🔷 BLE Mesh</h3>
      <button class="panel-close" id="ble-panel-close">✕</button>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab active" data-ptab="devices">Dispositivos</button>
      <button class="panel-tab" data-ptab="contacts">Contactos</button>
      <button class="panel-tab" data-ptab="connected">Conectados</button>
    </div>
    <div class="panel-content">
      <div id="ptab-devices" class="ptab-content active"></div>
      <div id="ptab-contacts" class="ptab-content"></div>
      <div id="ptab-connected" class="ptab-content"></div>
    </div>
  </div>
  <div id="ble-overlay"></div>

  <script src="./ble_interface.js"></script>
  <script src="./main.js"></script>
</body>
</html>
