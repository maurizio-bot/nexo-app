    - name: Sync Capacitor
      run: npx cap sync android
      
    # FIX: Crear gradle.properties en el proyecto DESPUÉS del sync
    - name: Configure Gradle Project
      working-directory: ./android
      run: |
        rm -f gradle.properties
        echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" > gradle.properties
        echo "org.gradle.daemon=false" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
        chmod +x gradlew
        echo "✅ Verificando android/gradle.properties:"
        cat gradle.properties
        ls -la gradle.properties
        
    - name: Verify Environment
      run: |
        echo "JAVA_HOME: $JAVA_HOME"
        java -version
        
    - name: Build Android Debug APK
      working-directory: ./android
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace
