name: Build NEXO APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Setup Java (JDK ${{ env.JAVA_VERSION }})
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
        
    - name: Install dependencies
      run: npm ci
      
    # ✅ FIX CRÍTICO: Usar build:web en lugar de build (para evitar Gradle prematuro)
    - name: Build web assets
      run: npm run build:web
      
    - name: Sync Capacitor (solo copia assets, sin build)
      run: npx cap sync android
      
    # ✅ FIX: Configurar Gradle DESPUÉS del sync y ANTES del build nativo
    - name: Fix Gradle Configuration
      working-directory: ./android
      run: |
        rm -f gradle.properties
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
        org.gradle.daemon=false
        android.useAndroidX=true
        android.enableJetifier=true
        EOF
        chmod +x gradlew
        echo "✅ gradle.properties:"
        cat gradle.properties
        
    - name: Build Android Debug APK
      working-directory: ./android
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}
      run: ./gradlew assembleDebug --no-daemon --stacktrace
        
    # ✅ NUEVO: Crear Release y subir APK (evita límite de Artifacts)
    - name: Create Release with APK
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v9.3.1-BLE.${{ github.run_number }}
        name: "NEXO BLE Build #${{ github.run_number }}"
        body: |
          ## 🚀 NEXO v9.3.1 - BLE Functional Build
          
          **Fixes incluidos:**
          - ✅ Fix [NORDIC_010]: Agregado `isBluetoothEnabled()` 
          - ✅ Fix: Manejo de `STATE_TURNING_ON` (Android 14)
          - ✅ BLE Plugin v1.3-NAP
          
          **Instrucciones:**
          1. Descarga el APK adjunto
          2. Instala en ambos dispositivos Android
          3. Activa Modo Avión + Bluetooth
          4. Abre la app y desbloquea el Vault
        files: android/app/build/outputs/apk/debug/app-debug.apk
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
