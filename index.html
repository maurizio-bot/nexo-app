<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="color-scheme" content="dark">
  <title>NEXO v9.0</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;color:#fff;font-family:system-ui,-apple-system,sans-serif;height:100vh;overflow:hidden}
    #splash-native{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s}
    #splash-logo{width:80px;height:80px;border:3px solid #00d4ff;border-radius:20px;animation:pulse 2s infinite}
    #splash-text{margin-top:20px;color:#00d4ff;font-size:18px;font-weight:600}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
    #app{display:flex;flex-direction:column;height:100vh}
    #chat-header{padding:12px 16px;border-bottom:1px solid #222;display:flex;flex-direction:column}
    #chat-contact-name{background:transparent;border:none;color:#fff;font-size:16px;font-weight:600;outline:none}
    #chat-contact-subtitle{color:#888;font-size:12px;margin-top:2px}
    #messages-container{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .msg-bubble{max-width:80%;padding:12px 16px;border-radius:16px;word-break:break-word}
    .msg-me{align-self:flex-end;background:rgba(0,212,255,0.15);border:1px solid #00d4ff}
    .msg-them{align-self:flex-start;background:rgba(255,255,255,0.05);border:1px solid #333}
    .msg-sender{font-size:12px;color:#00d4ff;margin-bottom:4px;font-weight:600}
    .msg-text{font-size:14px;line-height:1.4}
    .msg-time{font-size:10px;color:#888;margin-top:4px;text-align:right}
    #input-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #222}
    #message-input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:10px 14px;color:#fff;font-size:14px;outline:none}
    #send-btn{background:#00d4ff;border:none;border-radius:12px;padding:10px 20px;color:#000;font-weight:600;cursor:pointer}
    #send-btn:active{opacity:0.7}
    .hidden{display:none !important}
    #ble-controls{display:flex;gap:8px;padding:8px 16px;background:#111}
    .ble-btn{background:#222;border:1px solid #333;border-radius:8px;padding:8px 12px;color:#fff;font-size:12px;cursor:pointer}
    .ble-btn.active{background:#00d4ff;color:#000;border-color:#00d4ff}
    #device-list{position:fixed;top:60px;right:16px;width:280px;max-height:400px;background:#1a1a1a;border:1px solid #333;border-radius:12px;overflow-y:auto;z-index:100;display:none}
    #device-list.visible{display:block}
    .device-item{padding:12px;border-bottom:1px solid #222;cursor:pointer}
    .device-item:hover{background:rgba(0,212,255,0.1)}
    .device-name{font-weight:600;font-size:14px}
    .device-id{font-size:11px;color:#888}
    .device-rssi{font-size:11px;color:#00d4ff}
  </style>
</head>
<body>
  <div id="splash-native">
    <div id="splash-logo"></div>
    <div id="splash-text">NEXO v9.0</div>
  </div>
  <div id="app" class="hidden">
    <div id="chat-header">
      <input type="text" id="chat-contact-name" value="NEXO" autocomplete="off" spellcheck="false">
      <span id="chat-contact-subtitle">OFFLINE</span>
    </div>
    <div id="ble-controls">
      <button class="ble-btn" id="btn-scan">Buscar</button>
      <button class="ble-btn" id="btn-visibility">Visible</button>
      <button class="ble-btn" id="btn-devices">Dispositivos</button>
    </div>
    <div id="messages-container"></div>
    <div id="input-area">
      <input type="text" id="message-input" placeholder="Mensaje..." autocomplete="off">
      <button id="send-btn">Enviar</button>
    </div>
  </div>
  <div id="device-list">
    <div style="padding:12px;border-bottom:1px solid #333;font-weight:600">Dispositivos BLE</div>
    <div id="device-list-content"></div>
  </div>
  <script src="./main.js"></script>
</body>
</html>
