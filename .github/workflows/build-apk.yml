name: Build NEXO APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    # CRÍTICO: Setup Java 17 con JAVA_HOME explícito
    - name: Setup Java (JDK ${{ env.JAVA_VERSION }})
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true
        
    - name: Install dependencies
      run: npm ci
      
    # Build web assets (Capacitor requiere esto primero)
    - name: Build web assets
      run: npm run build
      
    # CRÍTICO: Sync Capacitor copia assets pero también puede tocar gradle
    - name: Sync Capacitor
      run: npx cap sync android
      
    # CRÍTICO FIX: Configurar Gradle DESPUÉS de cap sync y ANTES del build
    # Esto evita el error "Java Home invalid" que tenías en Build #357
    - name: Fix Gradle Configuration (Post-Sync)
      working-directory: ./android
      run: |
        echo "⚠️  Sobreescribiendo gradle.properties después de cap sync..."
        rm -f gradle.properties
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
        org.gradle.daemon=false
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.java.home=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.14/x64
        EOF
        chmod +x gradlew
        echo "✅ Gradle configurado:"
        cat gradle.properties
        
    - name: Verify Java Installation
      run: |
        echo "JAVA_HOME: $JAVA_HOME"
        java -version
        echo "Gradle wrapper version:"
        ./android/gradlew --version
        
    # CRÍTICO: Build con JAVA_HOME explícito y sin daemon
    - name: Build Android Debug APK
      working-directory: ./android
      run: |
        export JAVA_HOME=/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.14/x64
        echo "Building with JAVA_HOME: $JAVA_HOME"
        ./gradlew assembleDebug --no-daemon --stacktrace --info
        
    # Validar que el APK existe
    - name: Verify APK
      run: |
        ls -lh android/app/build/outputs/apk/debug/
        echo "APK size:"
        du -h android/app/build/outputs/apk/debug/app-debug.apk
        
    # Crear Release solo si el build fue exitoso
    - name: Create Release with APK
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        tag_name: v9.4.0-BLE.${{ github.run_number }}
        name: "NEXO BLE Android 14 Build #${{ github.run_number }}"
        body: |
          ## 🚀 NEXO v9.4.0 - BLE Android 14 Ready
          
          **Fixes Críticos:**
          - ✅ Fix [NORDIC_010]: Permisos BLUETOOTH_CONNECT/SCAN correctamente solicitados
          - ✅ Fix: `canAccessBluetooth()` verifica permisos antes de adapter
          - ✅ Fix: Orden de permisos BLUETOOTH_CONNECT primero en Android 14
          - ✅ Android 14 compatible (targetSdk 34, compileSdk 34)
          - ✅ Kotlin 1.9.0 + AGP 8.1.0
          
          **Testing:**
          1. Instala APK en ambos dispositivos
          2. Acepta permisos Bluetooth cuando se soliciten
          3. Activa Modo Avión + Bluetooth
          4. Desbloquea Vault → BLE debería inicializar
        files: android/app/build/outputs/apk/debug/app-debug.apk
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    # Notificar si falla
    - name: Notify Failure
      if: failure()
      run: |
        echo "❌ Build failed. Check logs above."
        echo "Common issues:"
        echo "1. Gradle Java Home not set correctly"
        echo "2. Missing Kotlin plugin"
        echo "3. Capacitor sync overwriting gradle.properties"
